# Local production test: docker compose up --build
# App: http://localhost:8000

services:
  macroreel:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATA_DIR: /data
      PORT: "8000"
    volumes:
      - macroreel-data:/data
    restart: unless-stopped

volumes:
  macroreel-data:
