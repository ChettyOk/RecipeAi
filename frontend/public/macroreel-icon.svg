<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEFF55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innershadow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- App icon rounded rect background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow in center -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#E8FF47;stop-opacity:0.08"/>
    <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#centerGlow)"/>

  <!-- Outer decorative ring track -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Ring track background -->
  <circle cx="256" cy="256" r="158" fill="none" stroke="#1C1C1C" stroke-width="22"/>

  <!-- 
    Circumference = 2 * pi * 158 = 992.7
    Protein (lime):  45% = 446.7, gap before next
    Carbs (amber):   35% = 347.4
    Fat (white):     18% = 178.7
    Gaps between:    ~3% each = ~10px gap × 3
  -->

  <!-- Protein arc — lime, largest, starts at top -->
  <circle cx="256" cy="256" r="158"
    fill="none"
    stroke="url(#limeGrad)"
    stroke-width="22"
    stroke-dasharray="436 992.7"
    stroke-dashoffset="0"
    stroke-linecap="round"
    transform="rotate(-90 256 256)"
    filter="url(#glow)"
  />

  <!-- Carbs arc — amber -->
  <circle cx="256" cy="256" r="158"
    fill="none"
    stroke="url(#amberGrad)"
    stroke-width="22"
    stroke-dasharray="330 992.7"
    stroke-dashoffset="-448"
    stroke-linecap="round"
    transform="rotate(-90 256 256)"
  />

  <!-- Fat arc — white/muted -->
  <circle cx="256" cy="256" r="158"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="22"
    stroke-dasharray="168 992.7"
    stroke-dashoffset="-790"
    stroke-linecap="round"
    opacity="0.35"
    transform="rotate(-90 256 256)"
  />

  <!-- Inner circle background for play button area -->
  <circle cx="256" cy="256" r="118" fill="#111111"/>
  <circle cx="256" cy="256" r="118" fill="none" stroke="#1E1E1E" stroke-width="1.5"/>

  <!-- Play triangle — slightly right-offset for optical centering -->
  <polygon
    points="228,196 228,316 340,256"
    fill="url(#limeGrad)"
    filter="url(#strongglow)"
  />

  <!-- Small dot indicators at arc start points (like a watch bezel) -->
  <circle cx="256" cy="75" r="5" fill="#E8FF47" opacity="0.6"/>

</svg>
